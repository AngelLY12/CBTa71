<div
  class="input-wrapper"
  [class.full-width]="fullWidth"
  [class.disabled]="isDisabled"
>

  <label *ngIf="label" [for]="id">
    {{ label }}
    <span *ngIf="isRequired" class="required">*</span>
  </label>

  <div
    class="input-container"
    [class.error]="hasError"
    [class.focused]="focused"
    [class.sm]="size === 'sm'"
    [class.md]="size === 'md'"
    [class.lg]="size === 'lg'"
    [class.disabled]="isDisabled"
    [class.has-left-icon]="iconLeft"
    [class.has-right-icon]="iconRight || clearable"
    [class.has-prefix]="prefix"
    [class.has-suffix]="suffix"
  >

    <i
      *ngIf="iconLeft"
      class="material-icons icon left"
      [class.clickable]="iconLeftClick.observers.length > 0"
      (click)="iconLeftClick.emit()"
      >
      {{ iconLeft }}
    </i>

    <span *ngIf="prefix" class="prefix">
      {{ prefix }}
    </span>

    <input
      [id]="id || name"
      [type]="type"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="isDisabled"
      [readonly]="readonly"
      [required]="isRequired"
      [attr.autocomplete]="autocomplete"
      [attr.maxlength]="maxLength"
      [attr.minlength]="minLength"
      [attr.min]="min"
      [attr.max]="max"
      [attr.step]="step"
      [attr.pattern]="pattern"
      (input)="handleInput($event)"
      (blur)="onBlur()"
      (focus)="onFocus()"
      (keydown)="onKeyDown($event)"

    />

    <span *ngIf="suffix" class="suffix">
      {{ suffix }}
    </span>

    <button
      *ngIf="clearable && value && !isDisabled && !iconRight"
      class="clear-button"
      (click)="clearValue()"
      type="button">
      <i class="material-icons">close</i>
    </button>

    <i
      *ngIf="iconRight"
      class="material-icons icon right clickable"
      (click)="iconRightClick.emit()">
      {{ iconRight }}
    </i>

  </div>

  <div class="input-footer">
    <ng-container *ngIf="errorTemplate && hasError">
      <ng-container *ngTemplateOutlet="errorTemplate; context: { $implicit: control?.errors }">
      </ng-container>
    </ng-container>

    <small *ngIf="hasError && !errorTemplate" class="error-text">
      {{ getErrorMessage() }}
    </small>

    <small *ngIf="hint && !hasError" class="hint">
      {{ hint }}
    </small>
  </div>

</div>
